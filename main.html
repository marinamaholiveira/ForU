<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For u</title>
  <link rel="stylesheet" href="estilo.css" />
</head>
<body>

  <div class="container">

    <div class="envelope-img-area">
      <img
        src="envelope.png"
        alt="Envelope"
        class="envelope-img"
        onerror="this.closest('.envelope-img-area').style.display='none'"
      />
    </div>

    <div class="envelope" id="envelope">
      <div class="envelope-body">
        <div class="envelope-flap"></div>
        <div class="envelope-front">
          <div class="letter-lines">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    </div>

    <button class="btn" id="btn" onclick="animarEnvelope()">
      <span class="btn-text">Abra a Carta</span>
    </button>
  </div>

  <script>
    let aberto = false;
    function animarEnvelope() {
      const envelope = document.getElementById('envelope');
      const btn = document.getElementById('btn');
      aberto = !aberto;
      if (aberto) {
        envelope.classList.add('aberto');
        btn.querySelector('.btn-text').textContent = 'Fechar';
      } else {
        envelope.classList.remove('aberto');
        btn.querySelector('.btn-text').textContent = 'Pressione-me';
      }
    }
  </script>

</body>
</html>
