<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For u</title>
  <link rel="stylesheet" href="estilo.css" />
</head>
<body>

  <div class="container">

    <div class="envelope-img-area">
      <img
        src="envelope.png"
        alt="Envelope"
        class="envelope-img"
        onerror="this.closest('.envelope-img-area').style.display='none'"
      />
    </div>

    <button class="btn" id="btn" onclick="abrirCarta()">
      <span class="btn-text">Abra a Carta</span>
    </button>
  </div>

  <div class="carta-overlay" id="cartaOverlay" onclick="fecharCarta()">
    <div class="carta-conteudo" onclick="event.stopPropagation()">
      <img
        src="carta.png"
        alt="Carta"
        class="carta-img"
        onerror="this.style.display='none'"
      />
      <button class="btn-fechar" onclick="fecharCarta()">✕</button>
    </div>
  </div>

  <script>
    function abrirCarta() {
      document.getElementById('cartaOverlay').classList.add('visivel');
    }
    function fecharCarta() {
      document.getElementById('cartaOverlay').classList.remove('visivel');
    }
  </script>

</body>
</html>
